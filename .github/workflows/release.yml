name: Release Extension

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - master

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag_check
        run: |
          TAG_NAME="v${{ steps.package_version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Skipping release."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Enable Yarn (packageManager in package.json)
        if: steps.tag_check.outputs.exists == 'false'
        run: corepack enable && corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: yarn install --frozen-lockfile

      - name: Test
        if: steps.tag_check.outputs.exists == 'false'
        run: yarn test

      - name: Build
        if: steps.tag_check.outputs.exists == 'false'
        run: yarn build

      - name: Zip extension
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          cd build
          zip -r ../extension-v${{ steps.package_version.outputs.version }}.zip .
          cd ..

      - name: Upload to Chrome Web Store
        if: steps.tag_check.outputs.exists == 'false'
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: extension-v${{ steps.package_version.outputs.version }}.zip
          extension-id: ${{ secrets.EXTENSION_ID }}
          client-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          refresh-token: ${{ secrets.REFRESH_TOKEN }}
          publish: true

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package_version.outputs.version }}
          files: extension-v${{ steps.package_version.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
